<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="100%">
    <style>
        .title { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 800; font-size: 48px; fill: #24292e; letter-spacing: 2px; }
        .subtitle { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; font-size: 22px; fill: #57606a; letter-spacing: 8px; }
        .accent { fill: #2f81f7; }
        @media (prefers-color-scheme: dark) {
        .title { fill: #f0f6fc; }
        .subtitle { fill: #8b949e; }
        .accent { fill: #58a6ff; }
        }
    </style>

    <!-- Увеличенный и подогнанный логотип -->
    <g transform="translate(80, 75)">
        <path d="M0 45 L45 0 L90 45 L45 90 Z" class="accent" opacity="0.15"/>
        <path d="M22.5 45 L45 22.5 L67.5 45 L45 67.5 Z" class="accent"/>
    </g>

    <!-- Скорректированные координаты для текста -->
    <text x="210" y="125" class="title">PET-ПРОЕКТЫ</text>
    <text x="212" y="170" class="subtitle">И OPEN SOURCE</text>
</svg>
